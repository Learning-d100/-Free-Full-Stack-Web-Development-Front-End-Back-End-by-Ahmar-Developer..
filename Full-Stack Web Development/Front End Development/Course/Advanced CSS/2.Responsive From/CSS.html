        <!--Link CSS-->
        <link rel="stylesheet" href="style.css">
        <title>
            Simple Stylish Responsive Form
        </title> 
        <!--Internal-CSS-->   
        <style>
            *{
                box-sizing: border-box;
            }
            .responsive-form{
                max-width: 600px;
                width: 100%;
                border-radius: 4px;
                border: 2px solid#04AA6D;
                background-color: #f2f2f2;
                padding: 20px;
            }
            form{
                display: flex;
                flex-wrap: wrap;
                justify-content: space-between;
            }
            label{
                min-width: 48%;
                margin-bottom: 10px;
            }
            input[type=text], select{
                min-width: 45%;
                margin-bottom: 10px;
                border: 1px solid#ccc;
                border-radius: 4px;
                padding: 10px;
            }
            textarea{
                min-width: 45%;
                margin-bottom: 10px;
                height: 150px;
                border: 1px solid #ccc;
                border-radius: 4px;
                padding: 10px;
            }
            input[type=submit]{
                width: 100%;
                padding: 14px;
                margin: 8px 0;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                color: white;
                background-color: #04AA6D;
            }
            /*Responsive*/
            @media screen and (max-width:600px){
                label,
                input[type=text], 
                input[type=submit],
                select, 
                textarea{
                    flex: 100%;
                    min-width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <h1 style="color: red; text-align: center; text-decoration: underline; text-shadow: 0px 4px 8px black;">Simple Stylish Responsive Form</h1>
        <h2 style="font-style: italic;">Resize the screen to see the form layout change!</h2>
        <!--responsive-Form-->
        <div class="responsive-form">
            <form action="/action_page.php">
                <!--First-Name-->
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" placeholder="Enter your first name...">
                <!--Last-Name-->
                <label for="lname">Last Name:</label>
                <input type="text" name="lname" id="lname" placeholder="Enter your last name...">
                <!--Country-->
                <label for="country">Country:</label>
                <select name="country" id="country">
                    <option value="australia">Australia</option>
                    <option value="canada">Canada</option>
                    <option value="usa">USA</option>
                </select>
                <!--Message-->
                <label for="message">Message:</label>
                <textarea name="message" id="message" placeholder="Write your message..."></textarea>
                <!--Submit-->
                <input type="submit" value="Submit">
            </form>
        </div>
    </body>
</html>
