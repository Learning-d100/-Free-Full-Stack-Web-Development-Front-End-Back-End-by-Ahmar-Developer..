<!DOCTYPE html>
<html lang="en" dir="auto">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <!--Font Awesome Link-->
        <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <!--Google fonts poppins-->
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
        <!--Bootstrap Icons link-->
        <link rel="stylesheet" href="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.css" />
        <lin rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
        <!--Google icons-->
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <!--Javascript other link-->
        <script src="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-scrollspy/2.4.0/simple-scrollspy.min.js"></script>
        <!--Link Javascript-->
        <script defer src="Javascript.js"></script>
        <!--Link CSS-->
        <link rel="stylesheet" href="style.css">
        <title>
            Dropdown image
        </title>
        <!--Internal CSS-->    
        <style>
            .dropdown{
                position: relative;
            }
            .dropdown-content{
                display: none;
                position: absolute;
                background-color: #f9f9f9;
                min-width: 160px;
            }
            .dropdown:hover .dropdown-content{
                display: block;
            }
            .desc{
                padding: 15px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h1>Dropdown image</h1>
        <p>Move the mouse over the image below to open the dropdown content.</p>
        <div class="dropdown">
            <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="Cinque Terre" width="100" height="50">
            <div class="dropdown-content">
                <img src="https://www.w3schools.com/css/img_5terre.jpg" alt="Cinque terre" width="300" height="200">
                <div class="desc">Beautiful Cinque Terre</div>
            </div>
        </div>
    </body>
</html>
