        <!--Link CSS-->
        <link rel="stylesheet" href="style.css">
        <title>
            Image Gallery
        </title>
        <!--Internal-CSS-->   
        <style>
            div.gallery{
                display: flex;
                flex-wrap: wrap;
                justify-content: flex-start;
            }
            div.gallery-item{
                margin: 5px;
                border: 1px solid #ccc;
                width: 180px;
            }
            div.gallery-item:hover{
                border: 1px solid #777;
            }
            div.gallery-item img{
                width: 100%;
                height: auto;
            }
            div.gallery-item div.desc{
                padding: 15px;
                text-align: center;
            }
            /*Responsive*/
            @media only screen and (max-width: 786px){
                div.gallery-item{
                    width: calc(50% - 20px);
                }
            }
            @media only screen and (max-width: 480px){
                div.gallery-item
                {
                    width: calc(50% - 20px);
                }
            }
        </style>
    </head>
    <body>
        <hr style="border-color: red; box-shadow: 16px 0px 16px 0px red;">
        <h1 style="color: red; text-align: center; text-decoration: underline;">CSS Course by AHMAR Developer.</h1>
        <h1 style="text-align: center; color: blue; text-decoration: underline; text-shadow: 3px 3px  rgba(55, 0, 255, 0.2);">17.Image Gallery</h1>
