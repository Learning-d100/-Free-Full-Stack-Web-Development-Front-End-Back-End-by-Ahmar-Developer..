        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <!--Google fonts poppins-->

        <!--Bootstrap Icons link-->
        <link rel="stylesheet" href="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.css" />
        <!--Javascript other link-->
        <script src="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.js"></script>

        <link rel="stylesheet" href="style.css">
        <title>
            Buttons,Javascript. Iframes, media, responsive
        </title>    
    </head>
    <body>
        <h1>buttons</h1>
        <button type="button">Normal Button</button>
<button type="submit">Submit</button>
<button type="reset">Reset</button>
<h1>iframes</h1>
<iframe src="https://img.magnific.com/free-photo/closeup-shot-beautiful-butterfly-with-interesting-textures-orange-petaled-flower_181624-7640.jpg?semt=ais_hybrid&w=740&q=80" style="border:2px solid red;" title="Iframe Example"></iframe>
<h1>Javascript</h1>
<button type="button"
onclick="document.getElementById('demo').innerHTML = Date()">
Click me to display Date and Time.</button>

<p id="demo"></p>
<h1>responsive</h1>
<h2>Show Different Images Depending on Browser Width</h2>
<p>Resize the browser width and the image will change at 600px and 1500px.</p>

<picture>
  <source srcset="https://www.w3schools.com/html/img_flowers.jpg" media="(max-width: 600px)">
  <source srcset="https://www.w3schools.com/html/img_smallflower.jpg" media="(max-width: 1500px)">
  <source srcset="https://www.w3schools.com/html/img_smallflower.jpg">
  <img src="https://www.w3schools.com/html/img_smallflower.jpg" alt="Flowers" style="width:auto;">
</picture>
<h1>media</h1>
<h2>video</h2>
<video width="320" height="240" autoplay>
  <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
  <source src="https://www.w3schools.com/html/movie.mp4" type="video/ogg">
  Your browser does not support the video tag.
</video>
<h2>audio</h2>
<audio controls>
  <source src="https://www.w3schools.com/html/horse.ogg" type="audio/ogg">
  <source src="https://www.w3schools.com/html/horse.ogg" type="audio/mpeg">
Your browser does not support the audio element.
</audio>
<h2>youtube</h2>
<iframe width="420" height="345" src="https://www.youtube.com/embed/tgbNymZ7vqY">
</iframe>
