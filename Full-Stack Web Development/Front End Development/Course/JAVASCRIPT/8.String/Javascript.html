    <body>
        <h1>Javascript Course</h1>
        <h2>8.String</h2>
        <h2>String Syntax</h2>
        <!--Internal-javascript-->
        <script defer>
            // String in Javascript
            let name = "John Doe";
            console.log(name); // Output: John Doe
            // String with single quotes
            let greeting = 'Hello, World!';
            console.log(greeting); // Output: Hello, World!
            // String with backticks (template literals)
            let age = 30;
            let message = `My name is ${name} and I am ${age} years old.`;
            console.log(message); // output: My name is John Doe and I am 30 years old.
            // String with escape characters
            let quote = "She said, \"Hello!\"";
            console.log(quote); // Output: She said, "Hello!"
            // String with new line
            let multiline = "This is a string\nthat spans multiple lines.";
            console.log(multiline); // Output: This is a string
                                        // that spans multiple lines.   
           // String with tab
            let tabbed = "This is a string\twith a tab.";
            console.log(tabbed); // Output: This is a string    with a tab.
            // String with backslash
            let path = "C:\\Users\\JohnDoe\\Documents";
            console.log(path); // Output: C:\Users\JohnDoe\Documents    
            // String with Unicode characters
            let unicode = "Hello, \u00A9 2024!";
            console.log(unicode); // Output: Hello, © 2024!
            // String with emoji
            let emoji = "Hello, World! 😊";
            console.log(emoji); // Output: Hello, World! 😊
            // String with special characters
            let special = "This is a string with special characters: !@#$%^&*()_+-=~`";
            console.log(special); // Output: This is a string with special characters: !@   
            // String with empty value
            let empty = "";
            console.log(empty); // Output: 
            // String with null value
            let nullString = null;
            console.log(nullString); // Output: null
            // String with undefined value
            let undefinedString = undefined;
            console.log(undefinedString); // Output: undefined
            // String with string concatenation
            let firstName = "John";
            let lastName = "Doe";
            let fullName = firstName + " " + lastName;
            console.log(fullName); // Output: John Doe
            // String with string interpolation
            let interpolated = `My name is ${fullName}.`;
            console.log(interpolated); // Output: My name is John Doe.
            // String with string methods
            let str = "Hello, World!";
            console.log(str.length) // Output: 13
            console.log(str.toUpperCase()) // Output: HELLO, WORLD!
            console.log(str.toLowerCase()) // Output: hello, world!
            console.log(str.indexOf("World")) // Output: 7
                console.log(str.slice(0, 5)) // Output: Hello
                console.log(str.replace("World", "JavaScript")) // Output: Hello, JavaScript!
                console.log(str.split(", ")) // Output: ["Hello", "World!"]
                console.log(str.trim()) // Output: Hello, World!
                // String with string comparison
                let str1 = "Hello";
                let str2 = "World";
                console.log(str1 === str2); // Output: false
                // String with string concatenation using template literals
                let str3 = `${str1} ${str2}`;
                console.log(str3); // Output: Hello World
                // String with string interpolation using template literals
                let str4 = `The length of the string is ${str.length}.`;
                console.log(str4); // Output: The length of the string is 13.
                // String with string methods chaining
                let str5 = "   Hello, World!   ";
                console.log(str5.trim().toUpperCase()); // Output: HELLO, WORLD!//
                // String with string template literals and expressions
                let a = 5;
                let b = 10;
                let c = `The sum of a and b is ${a + b}.`;
                console.log(c); // Output: The sum of a and b is 15.
                // String with string template literals and functions
                function greet(name) {
                    return `Hello, ${name}!`;
                }
                console.log(greet("Alice")); // Output: Hello, Alice!
                // String with string template literals and conditional expressions
                let isMorning = true;
                let greeting = `Good ${isMorning ? 'morning' : 'evening'}, Alice!`;
                console.log(greeting); // Output: Good morning, Alice!
                // String with string template literals and loops
                let items = ['apple', 'banana', 'orange'];
                let itemsList = items.map(item => ` - ${item}`).join('\n');
                console.log(itemsList); // Output:  - apple
                                        //         - banana
                                        //         - orange
                                        // String with string template literals and nested expressions
                let nested = `The result of 5 + 10 is ${5 + 10}.`;
                console.log(nested); // Output: The result of 5 + 10 is
                // String with string template literals and tagged templates
                function tag(strings, ...values) {
                    return strings[0] + values.map((value, index) => `${value}${strings[index + 1]}`).join('');
                }
                let tagged = tag`The sum of 5 and 10 is ${5 + 10}.`;
                console.log(tagged); // Output: The sum of 5 and 10 is 15.
                // String with string template literals and raw strings
                let raw = String.raw`The path is C:\Users\JohnDoe\Documents.`;
                console.log(raw); // Output: The path is C:\Users\JohnDoe\Documents     
                // String with string template literals and escaping backticks
                let escaped = `The backtick character is \``;
                console.log(escaped); // Output: The backtick character is `
                // String with string template literals and escaping dollar signs
                let escapedDollar = `The price is \$10.`;
                console.log(escapedDollar); // Output: The price is $10.
                // String with string template literals and escaping backslashes
                let escapedBackslash = `The file path is C:\\Users\\JohnDoe\\Documents.`;
                console.log(escapedBackslash); // Output: The file path is C:\Users\    JohnDoe\Documents.
                // String with string template literals and escaping newlines
                let escapedNewline = `This is a string with a newline character.\nThis is the second line.`;
                console.log(escapedNewline); // Output: This is a string with a newline character.
                                            // This is the second line. 
                                            // String with string template literals and escaping tabs
                let escapedTab = `This is a string with a tab character.\tThis is after the tab.`;
                console.log(escapedTab); // Output: This is a string with a tab character.
        </script>
