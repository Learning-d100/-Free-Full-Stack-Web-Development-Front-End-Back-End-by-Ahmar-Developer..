<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Functions</h1>

<p>A function can be used many times.</p>

<p id="demo"></p>

<script>
// Function to add two numbers
function add(a, b) {
  return a + b;
}

let sum1 = add(5, 5);
let sum2 = add(50, 50);

document.getElementById("demo").innerHTML = "The results are " + sum1 + " and " + sum2;
</script>

</body>
</html>
