<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // functions in javascript complete details
        // function is a block of code that performs a specific task
        // function is a reusable code that can be called multiple times
        // function is a set of statements that performs a task or calculates a value
        // function is a block of code that can be called by name
        // function is a block of code that can be called by name and can be passed data to operate on
        // function is a block of code that can be called by name and can be passed data to operate on and can return a value
        // function is a block of code that can be called by name and can be passed data to operate on and can return a value and can be used in an expression
        // function is a block of code that can be called by name and can be passed data to operate on and can return a value and can be used in an expression and can be assigned to a variable
        // function is a block of code that can be called by name and can be passed data to operate on and can return a value and can be used in an expression and can be assigned to a variable and can be passed as an argument to another function
        // function is a block of code that can be called by name and can be passed data to operate on and can return a value and can be used in an expression and can be assigned to a variable and can be passed as an argument to another function and can be returned by another function
        // function in javascript
        // function declaration
        function add(a, b) {
            return a + b;
        }
        // function expression
        const subtract = function(a, b) {
            return a - b;
        };
        // arrow function
        const multiply = (a, b) => {
            return a * b;
        };
        // function with default parameters
        function divide(a, b = 1) {
            return a / b;
        }
        // function with rest parameters
        function sum(...numbers) {
            return numbers.reduce((acc, curr) => acc + curr, 0);
        }
        // function with callback
        function greet(name, callback) {
            const message = `Hello, ${name}!`;
            callback(message);
        }
        // function with closure
        function outer() {
            let count = 0;
            function inner() {
                count++;
                return count;
            }
            return inner;
        }
        const counter = outer();
        console.log(counter()); // 1
        console.log(counter()); // 2
        // function with recursion
        function factorial(n) {
            if (n === 0) {
                return 1;
            }
            return n * factorial(n - 1);
        }
        console.log(factorial(5)); // 120
    </script>
</body>
</html>
