<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // sets
        let mySet = new Set();
        mySet.add(1);
        mySet.add(2);
        mySet.add(3);
        console.log(mySet);
        mySet.add(2);
        console.log(mySet);
        console.log(mySet.has(2));
        console.log(mySet.has(4));
        mySet.delete(2);
        console.log(mySet);
        // iterate over set
        for (let item of mySet) {
            console.log(item);
        }
        // size of set
        console.log(mySet.size);
        // clear set
        mySet.clear();
        // check if set is empty
        console.log(mySet.size === 0);
    </script>
</body>
</html>
