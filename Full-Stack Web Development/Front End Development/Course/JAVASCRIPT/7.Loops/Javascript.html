    <body>
        <h1>Javascript Loops</h1>
        <h2>1.For Loop</h2>
        <p id="demo"></p>
         <p id="demo1"></p>
         <p id="demo2"></p>

<script>
const cars = ["BMW", "Volvo", "Saab", "Ford"];
let len = cars.length;

let text = "";
let i;
for (i = 0; i < len; i++) {
  text += cars[i] + "<br>";
}

document.getElementById("demo").innerHTML = text;
let text_ = "";

let J = 0;
while (J < 10) {
  text_ += "The number is " + J + "<br>";
  J++;
}

document.getElementById("demo1").innerHTML = text_;
let text1 = "";
let k = 0;

do {
  text1 += "<br>The number is " + k;
  k++;
}
while (k < 10);  

document.getElementById("demo2").innerHTML = text1;
</script>
