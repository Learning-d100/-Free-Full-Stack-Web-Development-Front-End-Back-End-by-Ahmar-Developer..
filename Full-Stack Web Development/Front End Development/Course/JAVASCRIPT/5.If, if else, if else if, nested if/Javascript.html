        <!--Link CSS-->
        <link rel="stylesheet" href="style.css">
        <title>
            If, if else, if else if, nested if
        </title>    
    </head>
    <body>
        <h1 style="color: red; text-align: center; text-decoration: underline;">Javascript Course</h1>
        <h2 style="text-align: center; text-decoration: underline;">5.If Statement</h2>
        <hr style="border-color: red; box-shadow: 2px 4px 4px 2px rgba(202, 40, 40, 0.2), 2px 4px 4px 2px rgba(214, 70, 70, 0.2);">
        <h3>Simple If Statement.</h3>
        <p id="if"></p>
        <hr style="border-color: red; box-shadow: 2px 4px 4px 2px rgba(202, 40, 40, 0.2), 2px 4px 4px 2px rgba(214, 70, 70, 0.2);">
        <h3>Nested-if Statement.</h3>
        <p id="nestedIf"></p>
        <hr style="border-color: red; box-shadow: 2px 4px 4px 2px rgba(202, 40, 40, 0.2), 2px 4px 4px 2px rgba(214, 70, 70, 0.2);">
        <h3>If-else Statement.</h3>
        <p id="ifElse"></p>
        <hr style="border-color: red; box-shadow: 2px 4px 4px 2px rgba(202, 40, 40, 0.2), 2px 4px 4px 2px rgba(214, 70, 70, 0.2);">
        <h3>If-else-if Statement.</h3>
        <p id="ifElseIf"></p>
        <hr style="border-color: red; box-shadow: 2px 4px 4px 2px rgba(202, 40, 40, 0.2), 2px 4px 4px 2px rgba(214, 70, 70, 0.2);">
        <h3>Ternary Statement.</h3>
        <p id="ternary"></p>
        <!--Javascript Code-->
        <script defer>
            // if statement
            // variables
            let age = 18;
            let text = "You can not drive!";
            if (age >= 18){
                text = "You can drive!";
            }
            // execute if statement
            document.getElementById("if").innerHTML = text;
            // nested if statement
            let _age = 16;
            let country = "USA";
            let _text = "You can not drive!"; 
            if (country == "USA"){
                if (_age >= 16){
                    _text = "You can drive!";
                }
            }// execute nested if statement
            document.getElementById("nestedIf").innerHTML = _text;
            // if else statement
            const hour = new Date().getHours();
            let greeting;
            if (hour < 18){
                greeting = "Good day!";
            }else{
                greeting = "Good Evening!";
            }// execute if else statement
            document.getElementById("ifElse").innerHTML = greeting;
            //if-else-if statement
            const time = new Date().getHours();
            let _greeting;
            if (time < 10){
                _greeting = "Good morning!";
            }else if (time < 20){
                _greeting = "Good day!";
            }else{
                _greeting = "Good evening!";
            }// execute if-else-if statement
            document.getElementById("ifElseIf").innerHTML = _greeting;
            //Ternary
            let age1 = 16;
            let text1 = (age < 18) ? "Mirror" : "Adult";  
            //execute ternary
            document.getElementById("ternary").innerHTML = text1;
        </script>
    </body>
