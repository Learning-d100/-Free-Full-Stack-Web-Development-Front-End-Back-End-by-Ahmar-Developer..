<!DOCTYPE html>
<html>
<body>

<h1>JavaScript Arithmetic</h1>
<h2>Operator Precedence</h2>
<p>When many operations has the same precedence, they are computed from left to right.</p>

<p id="demo"></p>
<p id="demo1"></p>
<p id="demo2"></p>
<script>
document.getElementById("demo").innerHTML = 100 / 50 * 3;
let x = 10;
x *= 5;
document.getElementById("demo1").innerHTML = "Value of x is: " + x;
let text1 = "A";
let text2 = "B";
let result = text1 < text2;
document.getElementById("demo2").innerHTML = "Is A less than B? " + result;
</script>

</body>
</html>
