<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <!--Font Awesome Link-->
        <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <!--Google fonts poppins-->
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
        <!--Bootstrap Icons link--> 
        <link rel="stylesheet" href="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.css" />
        <lin rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
        <!--Google icons-->
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <!--Javascript other link-->
        <script src="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-scrollspy/2.4.0/simple-scrollspy.min.js"></script>
        <!--Link Javascript-->
        <script defer src="../JAVASCRIPT/JAVASCRIPT.js"></script>
        <!--Link CSS File-->
        <link rel="stylesheet" href="../CSS/CSS.css">
        <title>
            Random Password Generator
        </title>    
    </head>
    <body>
        <!--container-->
        <div class="wrapper">
            <!--Main-Card-->
            <main class="card">
                <!--Heading-->
                <h1>
                    <!--Lock-Icon-->
                    <span class="lock-icon">🔒</span>
                    Random <br> Password Generator
                </h1>
                <!--Display-COntainer-->
                <div class="display-container">
                    <!--Password Display-->
                    <input type="text" id="password-display" placeholder="Click generate below:" readonly>
                </div>
                <!--PAssword-Length-->
                <label class="length-label">Password Length
                    <!--Length value-->
                    <span id="length-val">8</span>
                </label>
                <!--Length Slider-->
                <div class="slider-container">
                    <input type="range" id="length-slider" class="slider" min="4" max="20" value="8">
                </div>
                <!--Option-List-->
                <div class="options-list">
                    <!--Include Uppercase letters-->
                    <label class="option-item">
                        <span>Include Uppercase letters</span>
                        <input type="checkbox" id="uppercase" checked>
                    </label>
                    <!--Include Lowercase letters-->
                    <label class="option-item">
                        <span>Include Lowercase letters</span>
                        <input type="checkbox" id="lowercase" checked>
                    </label>
                    <!--Include Numbers-->
                    <label class="option-item">
                        <span>Include Numbers</span>
                        <input type="checkbox" id="numbers" checked>
                    </label>
                    <!--Include Symbols-->
                    <label class="option-item">
                        <span>Include Symbols</span>
                        <input type="checkbox" id="symbols" checked>
                    </label>
                </div>
            </main>
            <!--password-generator button-->
            <button class="generate-btn" id="generate-trigger">Generate Password</button>
        </div>
    </body>
</html>
