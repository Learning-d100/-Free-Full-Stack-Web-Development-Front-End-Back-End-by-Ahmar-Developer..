<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <!--Font Awesome Link-->
        <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <!--Google fonts poppins-->
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
        <!--Bootstrap Icons link-->
        <link rel="stylesheet" href="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.css" />
        <lin rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
        <!--Google icons-->
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <!--Javascript other link-->
        <script src="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-scrollspy/2.4.0/simple-scrollspy.min.js"></script>
        <!--Link Javascript-->
        <script defer src="../JAVASCRIPT/JAVASCRIPT.js"></script>
        <!--Link CSS-->
        <link rel="stylesheet" href="../CSS/CSS.css"> 
        <title>
            Contact Us Page
        </title>    
    </head>
    <body>
        <!--Main-->
        <main>
            <!--Contact-form-->
            <section class="contact-form">
                <!--Form-header-->
                <div class="form-header">
                    <!--Heading-->
                    <h1>Contact Us For Work</h1>
                    <!--Description-->
                    <p class="desc">We'd love to hear from you. Please fill out the below or reach out to us using the contact information provided.</p>
                </div>
                <!--Form-->
                <form>
                    <!--Name-->
                    <div class="form-field">
                        <label for="name">Name</label>
                        <input type="text" name="name" placeholder="Enter Your Name...">
                    </div>
                    <!--Email-->
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input type="email" name="email" placeholder="Enter Your Email...">
                    </div>
                    <!--Subject-->
                    <div class="form-field">
                        <label for="subject">Subject</label>
                        <input type="text" name="subject" placeholder="Enter Your Subject...">
                    </div>
                    <!--Message-->
                    <div class="form-field">
                        <label for="message">Message</label>
                        <textarea name="message" placeholder="Enter Your Message..."></textarea>
                    </div>
                    <!--Submit-->
                    <div class="form-submit">
                        <button type="submit">Send Message</button>
                    </div>
                </form>
            </section>
            <!--Contact-info-->
            <section class="contact-info">
                <!--Info-contents-->
                <div class="info-content">
                    <!--Location-->
                    <div class="info-section">
                        <h2>Our Location</h2>
                    </div>
                    <!--Address-->
                    <div class="info-item">
                        <p>123 Main Street, Anytime, CA 91234</p>
                    </div>
                    <!--Phone-->
                    <div class="info-item">
                        <p>Phone: (555) 123-4567</p>
                    </div>
                    <!--Email-->
                    <div class="info-item">
                        <p>Email: contact@dosomecoding.com</p>
                    </div>
                </div>
                <!--Map-->
                <div class="map-container">
                    <!--Image-->
                    <img src="../Images/map.png" alt="Location Map">
                </div>
            </section>
        </main>
    </body>
</html>
