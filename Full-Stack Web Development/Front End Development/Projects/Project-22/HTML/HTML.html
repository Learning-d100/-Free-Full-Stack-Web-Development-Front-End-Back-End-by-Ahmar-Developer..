<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <!--Font Awesome Link-->
        <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <!--Google fonts poppins-->
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
        <!--Bootstrap Icons link-->
        <link rel="stylesheet" href="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.css" />
        <lin rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
        <!--Google icons-->
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <!--Javascript other link-->
        <script src="https://unpkg.com/accordion-js@3.3.4/dist/accordion.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/pushbar.js@1.0.0/src/pushbar.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-scrollspy/2.4.0/simple-scrollspy.min.js"></script>
        <!--Link Javascript-->
        <script defer src="../JAVASCRIPT/JAVASCRIPT.js"></script>
        <!--Link CSS-->
        <link rel="stylesheet" href="../CSS/CSS.css"> 
        <title>
            Food Banner
        </title>    
    </head>
    <body>
        <!--Main-->
        <main>
            <!--image-container-->
            <div class="image_container">
                <!--background image-->
                <img src="../Images/bg_image.png" alt="Bg Image">
            </div>
            <!--contents-->
            <div class="content">
                <!--burger-image-->
                <img src="../Images/burger.png" class="burger">
                <!--tomato-image-->
                <img src="../Images/tomato.png" class="tomato-1">
                <!--tomato-image-->
                <img src="../Images/tomato.png" class="tomato-2">
                <!--pizza-image-->
                <img src="../Images/pizza.png" class="pizza">
                <!--momo-image-->
                <img src="../Images/momo.png" class="momo">
                <!--leaf-image-->
                <img src="../Images/leaf.png" class="leaf">
                <!--center-contents-->
                <div class="center-content">
                    <!--text-content-->
                    <section class="text-content">
                        <!--Food Heading-->
                        <h1>Better food <br>for more people</h1>
                        <!--Food Description-->
                        <p>For over a decade, we’ve enabled our customers to discover new tastes, delivered right to their doorstep</p>
                    </section>
                    <!--Info-section-->
                    <section class="info-section">
                        <!--House image-->
                        <div class="info-item">
                            <img src="../Images/house.png" alt="Restaurant icon" class="info-icon" />
                            <!--text-info-->
                            <div class="info-text">
                                <span class="info-number">3,00,000+</span>
                                <span class="info-label">Restaurants</span>
                            </div>
                        </div>
                        <!--location image-->
                        <div class="info-item">
                            <img src="../Images/location.png" alt="Location icon" class="info-icon" />
                            <!--text-info-->
                            <div class="info-text">
                                <span class="info-number">800+</span>
                                <span class="info-label">cities</span>
                            </div>
                        </div>
                        <!--banner image-->
                        <div class="info-item">
                            <img src="../Images/banner.png" alt="Orders icon" class="info-icon" />
                            <!--text-info-->
                            <div class="info-text">
                                <span class="info-number">3 billion+</span>
                                <span class="info-label">orders delivered</span>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </body>
</html>
