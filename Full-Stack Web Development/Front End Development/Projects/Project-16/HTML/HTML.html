            CSS Flexbox & Grid Layout-6

    </head>
    <body>
        <!--Spacing-->
        <div class="spacing">
            <!--Container-->
            <div class="container">
                <!--Top-Section-->
                <section class="top_section">
                    <!--Circle-input-->
                    <div class="circle_input_section">
                        <!--Avatar-->
                        <div class="avatar"></div>
                        <!--Input-->
                        <div class="input"></div>
                    </div>
                    <!--Info-Section-->
                    <div class="tag_info_section">
                        <!--Info-->
                        <div class="tag_info">
                            <!--Square-->
                            <div class="square"></div>
                            <!--Line-COntainer-->
                            <div class="line_container">
                                <!--3-Lines-->
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                        </div>
                        <!--Info-2-->
                        <div class="tag_info">
                            <!--Square-->
                            <div class="square"></div>
                            <!--Line-COntainer-->
                            <div class="line_container">
                                <!--3-Lines-->
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                        </div>
                        <!--Info-3-->
                        <div class="tag_info">
                            <!--Square-->
                            <div class="square"></div>
                            <!--Line-COntainer-->
                            <div class="line_container">
                                <!--3-Lines-->
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                        </div>
                    </div>
                </section>
                <!--Bottom-Section-->
                <section class="bottom_container">
                    <!--Info-Container-->
                    <div class="user_info_container">
                        <!--Info-->
                        <div class="user_info">
                            <!--Avatar-->
                            <div class="avatar"></div>
                            <!--Details-->
                            <div class="details">
                                <!--Rect-->
                                <div class="rect"></div>
                                <!--2-Lines-->
                                <div class="line"></div>
                                <div class="line"></div>
                                <!--More-Details-->
                                <div class="more_details">
                                    <!--2-Boxes-->
                                    <div class="box1"></div>
                                    <div class="box2"></div>
                                </div>
                            </div>
                        </div>
                        <!--Controls-->
                        <div class="controls">
                            <!--2-control-->
                            <div class="control"></div>
                            <div class="control"></div>
                        </div>
                    </div>
                    <!--Content-Container-->
                    <div class="content_container">
                        <!--2-bars-->
                        <div class="bar1"></div>
                        <div class="bar2"></div>
                        <!--Content-->
                        <div class="content"></div>
                    </div>
                </section>
            </div>
        </div>
